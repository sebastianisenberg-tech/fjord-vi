<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Admin Fjord VI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial; margin:20px;">

<h2>Panel administrativo</h2>

<h3>Crear salida</h3>
<form action="/admin/create_outing" method="post">
  <input name="title" placeholder="Título"><br><br>
  <input name="destination" placeholder="Destino"><br><br>
  <input name="date" placeholder="Fecha (YYYY-MM-DD HH:MM)"><br><br>
  <input name="price" value="4500"><br><br>
  <button type="submit">Crear salida vacía</button>
</form>

<hr>

<h3>Salidas publicadas</h3>
{% for o in outings %}
  <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">
    <b>{{o.title}}</b><br>
    {{o.date}}<br>
    {{o.destination}}<br>
    Activos: {{o.active}}<br>
    <a href="/admin/select_outing/{{o.id}}">Seleccionar</a>
  </div>
{% endfor %}

<hr>

<h3>Backup JSON</h3>

<a href="/admin/backup">
  <button>Descargar backup</button>
</a>

<form action="/admin/restore" method="post" enctype="multipart/form-data">
  <input type="file" name="file" required>
  <button type="submit">Restaurar JSON</button>
</form>

</body>
</html>
