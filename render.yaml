services:
  - type: web
    name: fjord-vi-v18-deploy-ready
    env: docker
    plan: free
    autoDeploy: true
    disk:
      name: fjord-vi-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: pilot
      - key: DATA_DIR
        value: /app/data
      - key: MAX_CREW
        value: 9
      - key: MIN_CREW
        value: 2
      - key: INVITED_FEE
        value: 4500
      - key: SECRET_KEY
        generateValue: true
