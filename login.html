<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="/static/style.css">
  <title>Yacht Club Argentino · Fjord VI · Sistema de Reservas</title>
</head>
<body class="loginBody premiumHeroLogin">
  <main class="premiumLoginPage">
    <section class="premiumLoginHero" aria-label="Fjord VI">
      <div class="premiumHeroOverlay"></div>
      <div class="premiumHeroBrand">
        <img src="/static/logo_yca.jpg" alt="Yacht Club Argentino" class="premiumHeroLogo">
        <h1>Yacht Club<br>Argentino</h1>
        <div class="premiumHeroBoat">FJORD VI</div>
        <div class="premiumHeroLine"></div>
        <div class="premiumHeroSystem">Sistema de Reservas</div>
      </div>
    </section>

    <section class="premiumLoginPanel" aria-label="Ingreso al sistema">
      <div class="premiumPanelHandle"></div>
      {% if error %}<div class="alert bad premiumLoginError">Documento o clave incorrectos</div>{% endif %}
      <form method="post" action="/login" class="premiumLoginForm">
        <label for="dni">Documento</label>
        <div class="premiumInputWrap">
          <span class="premiumInputIcon">☉</span>
          <input id="dni" name="dni" autocomplete="username" inputmode="text" placeholder="Ingresá tu número de documento" required>
        </div>

        <label for="password">Clave</label>
        <div class="premiumInputWrap">
          <span class="premiumInputIcon">▣</span>
          <input id="password" type="password" name="password" autocomplete="current-password" placeholder="Ingresá tu contraseña" required>
        </div>

        <button class="premiumLoginButton">Ingresar</button>
      </form>

      <div class="premiumLoginDivider"><span>⚓</span></div>

      <div class="premiumLoginContact">
        <strong>Oficina de Vela · Dársena Norte</strong>
        <a href="tel:+541143140505">+54 11 4314-0505</a>
      </div>

      <small class="version premiumLoginVersion">{{club_name}} · {{app_name}} · Sistema de Reservas<br>{{version}} | build: {{app_build}}</small>
    </section>
  </main>
</body>
</html>
