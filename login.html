<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css"><title>Fjord VI</title>
</head>
<body class="loginBody">
  <main class="loginShell">
    <section class="loginCard">
      <div class="mark">FJORD VI</div>
      <h1>Paseos de fin de semana</h1>
      <p class="muted">Piloto V17 con reservas, invitados, control de embarque y liquidación.</p>
      {% if error %}<div class="alert bad">DNI o clave incorrectos.</div>{% endif %}
      <form method="post" action="/login">
        <label>DNI</label><input class="input" name="dni" placeholder="20123456" autocomplete="username">
        <label>Clave</label><input class="input" name="password" type="password" placeholder="demo1234" autocomplete="current-password">
        <button class="btn navy">Ingresar al sistema</button>
      </form>
      <div class="demoBox">
        <b>Accesos demo</b>
        <span>Socio: 20123456 / demo1234</span>
        <span>Capitán: 30999111 / demo1234</span>
        <span>Admin: 27999111 / demo1234</span>
      </div>
      <small class="version">{{version}}</small>
    </section>
  </main>
</body>
</html>
