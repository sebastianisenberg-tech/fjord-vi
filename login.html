<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
  <title>Yacht Club Argentino · Fjord VI · Embarque</title>
</head>
<body class="loginBody institutionalLogin">
  <div class="container loginShell">
    <div class="card loginCard premiumLoginCard">
      <div class="loginBrandBlock">
        <div class="clubFullName">Yacht Club Argentino</div>
        <div class="boatName">FJORD VI</div>
        <div class="systemName">EMBARQUE</div>
      </div>
      {% if error %}<div class="alert bad">Documento o clave incorrectos</div>{% endif %}
      <form method="post" action="/login" class="loginForm">
        <label>Documento</label>
        <input name="dni" autocomplete="username" inputmode="text" required>
        <label>Clave</label>
        <input type="password" name="password" autocomplete="current-password" required>
        <button>Ingresar</button>
      </form>
      <div class="loginContact">
        <strong>Oficina de Vela</strong><br>
        Dársena Norte<br>
        <a href="tel:+541143140505">+54 11 4314-0505</a>
      </div>
      <small class="version loginVersion">Embarque Fjord VI {{version}}</small>
    </div>
  </div>
</body>
</html>
