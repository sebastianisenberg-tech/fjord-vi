<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css?v={{version}}">
<title>Socios · {{app_name}}</title>
<script>
function toggleHijoMenorField(){const tipo=document.getElementById('guest_kind');const bloque=document.getElementById('hijo_menor_fields');if(!tipo||!bloque)return;bloque.style.display=(tipo.value==='hijo_menor')?'block':'none';}
document.addEventListener('DOMContentLoaded',toggleHijoMenorField);
document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('form').forEach(function(form){form.addEventListener('submit',function(){form.querySelectorAll('button').forEach(function(btn){btn.disabled=true;btn.classList.add('disabledBtn');});});});});

document.addEventListener("DOMContentLoaded",function(){const toast=document.querySelector(".toastSmart");if(toast){const close=toast.querySelector(".toastClose");if(close){close.addEventListener("click",function(){toast.classList.add("toastLeaving");});}setTimeout(function(){toast.classList.add("toastLeaving");},5200);}document.querySelectorAll("button,.btn,.miEmbCta,.selectRow,.bottom a").forEach(function(el){el.addEventListener("pointerdown",function(){el.classList.add("isPressed");});["pointerup","pointercancel","pointerleave"].forEach(function(ev){el.addEventListener(ev,function(){el.classList.remove("isPressed");});});});});

function showSocioNotice(text){
  var old=document.querySelector('.inlineToastV513');
  if(old) old.remove();
  var t=document.createElement('div');
  t.className='toast compactToast toastSmart inlineToastV513 toastWarn';
  t.setAttribute('role','status');
  t.innerHTML='<span class="toastIcon">i</span><span class="toastText">'+text+'</span><button type="button" class="toastClose" aria-label="Cerrar aviso">×</button>';
  var main=document.querySelector('.socioWrap');
  if(main){ main.insertBefore(t, main.firstChild); }
  var c=t.querySelector('.toastClose');
  if(c){ c.addEventListener('click',function(){t.remove();}); }
  setTimeout(function(){ if(t && t.parentNode){ t.remove(); } },4200);
}

// Fjord VI v2.6 · Inicio único: sin flecha central, teclado cerrado y scroll controlado.
document.addEventListener('DOMContentLoaded', function(){
  var activeScroll = null;

  function closeTransientUI(){
    try{
      if(document.activeElement && typeof document.activeElement.blur === 'function'){
        document.activeElement.blur();
      }
    }catch(e){}
    document.querySelectorAll('details[open]').forEach(function(d){ d.removeAttribute('open'); });
    document.querySelectorAll('.guestMenuOpen,.menuOpen,.openMenu').forEach(function(el){
      el.classList.remove('guestMenuOpen','menuOpen','openMenu');
    });
  }

  function smoothScrollTop(duration){
    closeTransientUI();
    duration = duration || 380;
    var start = window.pageYOffset || document.documentElement.scrollTop || 0;
    if(start <= 2){
      window.scrollTo(0,0);
      return;
    }
    var startTime = null;
    var cancelled = false;
    function cancel(){ cancelled = true; cleanup(); }
    function cleanup(){
      window.removeEventListener('touchstart', cancel, {passive:true});
      window.removeEventListener('wheel', cancel, {passive:true});
    }
    window.addEventListener('touchstart', cancel, {passive:true});
    window.addEventListener('wheel', cancel, {passive:true});
    function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }
    function step(ts){
      if(cancelled) return;
      if(startTime === null) startTime = ts;
      var t = Math.min(1, (ts - startTime) / duration);
      window.scrollTo(0, Math.round(start * (1 - easeOutCubic(t))));
      if(t < 1){ activeScroll = window.requestAnimationFrame(step); }
      else { cleanup(); history.replaceState(null, '', window.location.pathname + window.location.search); }
    }
    if(activeScroll){ window.cancelAnimationFrame(activeScroll); }
    activeScroll = window.requestAnimationFrame(step);
  }

  document.querySelectorAll('.socioV51Bottom a[href="#inicio"], .bottom a[href="#inicio"]').forEach(function(link){
    link.addEventListener('click', function(ev){
      ev.preventDefault();
      smoothScrollTop(380);
    });
  });
});

</script>
</head>
<body><div class="app socioApp socioProV464 socioV51 socioV20">
<header class="top topGreen premiumTop appHeaderPremium socioProHeader">
  <div class="headerBrand"><img src="/static/logo_yca.jpg" class="headerLogo headerLogoCapsule" alt="YCA"><div><b>{{club_name}} · {{app_name}}</b><small><span class="socioHeaderRole">Socio · <span class="socioHeaderName">{{user.name}}</span></span></small></div></div>
  <script src="/static/app.js?v={{version}}"></script>

<script>
(function fjordInicioScrollTopV26(){
  function closeOpenUi(){
    try{
      if(document.activeElement && typeof document.activeElement.blur === 'function'){
        document.activeElement.blur();
      }
      document.querySelectorAll('[open]').forEach(function(el){ try{ el.removeAttribute('open'); }catch(e){} });
      document.querySelectorAll('.open,.is-open,.active-menu,.show').forEach(function(el){
        if(el.closest && el.closest('nav.bottom')) return;
        try{ el.classList.remove('open','is-open','active-menu','show'); }catch(e){}
      });
    }catch(e){}
  }
  function goTop(ev){
    if(ev){ ev.preventDefault(); ev.stopPropagation(); }
    closeOpenUi();
    try{ window.scrollTo({ top: 0, left: 0, behavior: 'smooth' }); }
    catch(e){ window.scrollTo(0,0); }
  }
  document.addEventListener('DOMContentLoaded', function(){
    var links = Array.prototype.slice.call(document.querySelectorAll('nav.bottom a, .socioV51Bottom a'));
    links.forEach(function(a){
      var label = (a.textContent || '').trim().toLowerCase();
      if(label.indexOf('inicio') !== -1){
        a.addEventListener('click', goTop, true);
      }
    });
  });
})();
</script>

</body></html>
