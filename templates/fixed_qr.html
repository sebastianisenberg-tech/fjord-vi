<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR fijo · {{club_name}} · {{app_name}}</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:#eef5fb;color:#0f172a}.wrap{max-width:760px;margin:0 auto;padding:32px 18px}.sheet{background:white;border:1px solid #dbe5ee;border-radius:28px;padding:34px;text-align:center;box-shadow:0 22px 54px rgba(15,23,42,.10)}.logo{width:min(220px,80%);height:auto;max-height:92px;object-fit:contain;object-position:center;display:block;margin:0 auto 14px;background:#fff;border-radius:10px;padding:0}.eyebrow{text-transform:uppercase;letter-spacing:.16em;color:#64748b;font-weight:950;font-size:13px}h1{font-size:38px;margin:8px 0 4px}.sub{font-size:20px;color:#475569}.qr{width:78%;max-width:420px;margin:24px auto;border:1px solid #e2e8f0;border-radius:22px;padding:18px;background:#fff}.qr img{width:100%;display:block}.url{word-break:break-all;color:#475569}.note{margin-top:18px;font-size:18px;line-height:1.4}.btn{display:inline-block;margin-top:20px;background:#1f4e79;color:#fff;padding:14px 22px;border-radius:16px;font-weight:900;text-decoration:none}@media print{body{background:#fff}.btn{display:none}.sheet{box-shadow:none;border:0;padding:22mm 14mm}.wrap{padding:0}.logo{width:190px;max-height:86px;object-fit:contain}.qr{max-width:500px;margin-top:18px}}
  </style>
</head>
<body>
  <div class="wrap"><div class="sheet">
    <img class="logo" src="/static/logo_yca_trans.png" alt="YCA">
    <div class="eyebrow">Yacht Club Argentino · Fjord VI</div>
    <h1>Embarque</h1>
    <div class="sub">Escaneá para registrar tu llegada a la navegación del día.</div>
    <div class="qr"><img src="{{qr_url}}" alt="QR fijo Fjord VI"></div>
    <div class="url">{{fixed_url}}</div>
    <div class="note">El sistema pide documento y solo acepta personas que figuran en la salida activa del día. La autorización final corresponde al capitán.</div>
    <a class="btn" href="javascript:window.print()">Imprimir QR</a>
  </div></div>
<script src="/static/app.js?v=v64.1"></script>
</body>
</html>
