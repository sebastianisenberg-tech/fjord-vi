<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fjord VI · Sesión requerida</title>
  <link rel="stylesheet" href="/static/style.css?v={{version}}">
  <style>
    body{margin:0;background:#eef5f9;color:#102033;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .sessionShell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .sessionCard{width:min(520px,100%);background:white;border:1px solid #d8e6ee;border-radius:24px;box-shadow:0 18px 42px rgba(16,48,70,.12);padding:26px}
    .sessionTop{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#6d7d89;font-weight:900;margin-bottom:10px}
    .sessionCard h1{margin:0 0 8px;font-size:28px;line-height:1.1}
    .sessionCard p{color:#5d6c77;font-size:16px;line-height:1.45;margin:0 0 18px}
    .sessionActions{display:flex;gap:10px;flex-wrap:wrap}
    .sessionBtn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:12px 18px;text-decoration:none;font-weight:900;border:1px solid #0b5f8f}
    .sessionBtn.primary{background:#0b5f8f;color:white}
    .sessionBtn.secondary{background:#f1f7fb;color:#0b5f8f}
    .sessionHint{margin-top:16px;border-top:1px solid #e5eef3;padding-top:14px;font-size:13px;color:#71818c}
  </style>
</head>
<body>
  <main class="sessionShell">
    <section class="sessionCard">
      <div class="sessionTop">Fjord VI</div>
      <h1>Sesión vencida</h1>
      <p>Para continuar necesitás volver a ingresar. Esto puede pasar al cambiar de usuario, abrir una ficha vieja o volver desde una pestaña anterior.</p>
      <div class="sessionActions">
        <a class="sessionBtn primary" href="/">Ir al ingreso</a>
        <a class="sessionBtn secondary" href="/logout">Salir y reiniciar sesión</a>
      </div>
      <div class="sessionHint">No se perdió información de la salida. Solo falta autenticar nuevamente esta pantalla.</div>
    </section>
  </main>
</body>
</html>
