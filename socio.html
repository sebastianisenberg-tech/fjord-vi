{% extends "base.html" %}

{% block content %}

<div class="card">
  <h2>Reserva</h2>
  <h3>{{ salida.nombre }}</h3>

  <div class="status ok">
    {{ estado }}
  </div>

  <div class="grid-3">
    <div><strong>Ocupación</strong><br>{{ activos }}/9</div>
    <div><strong>Libres</strong><br>{{ libres }}</div>
    <div><strong>Mínimo</strong><br>2</div>
  </div>
</div>

<div class="card">
  <h3>Tu lugar</h3>

  {% if es_titular %}
    <div class="badge ok">Activo</div>
    <button class="btn danger" onclick="baja()">Quitarme</button>
  {% else %}
    <button class="btn ok" onclick="alta()">Anotarme</button>
  {% endif %}
</div>

<div class="card">
  <h3>Invitados</h3>

  {% for i in invitados %}
  <div class="crew">
    <strong>{{ i.nombre }}</strong>
    <span class="badge invitado">Invitado</span>
    <button class="btn danger" onclick="quitar({{ i.id }})">Quitar</button>
  </div>
  {% endfor %}

  <input id="nombre" placeholder="Nombre y apellido">
  <input id="dni" placeholder="DNI">

  <button class="btn ok" onclick="agregar()">Agregar invitado</button>
</div>

<script>
function alta(){
  fetch("/alta", {method:"POST"}).then(()=>location.reload());
}
function baja(){
  fetch("/baja", {method:"POST"}).then(()=>location.reload());
}
function agregar(){
  fetch("/invitar", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      nombre: document.getElementById("nombre").value,
      dni: document.getElementById("dni").value
    })
  }).then(()=>location.reload());
}
function quitar(id){
  fetch(`/quitar/${id}`, {method:"POST"}).then(()=>location.reload());
}
</script>

{% endblock %}
